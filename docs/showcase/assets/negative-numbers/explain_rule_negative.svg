<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="480" fill="#f8fafc" />
  <rect width="800" height="65" fill="#1565C0" />
  <g id="u0" data-reveal-order="0" data-ref="title" data-type="title">
  <text x="80" y="44" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="start">Explain: explain rule negative</text>
  </g>
  <rect x="651" y="23" width="69" height="18" rx="4" fill="#000000" opacity="0.35" />
  <text x="685" y="36" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">EXPLAIN</text>
  <line x1="80" y1="65" x2="720" y2="65" stroke="#fde047" stroke-width="1.5" />
  <rect x="80" y="65" width="52" height="16" rx="3" fill="#fef3c7" stroke="#fde047" stroke-width="1.2" />
  <text x="106" y="76.5" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#78350f" text-anchor="middle">ANCHOR</text>
  <g id="u1" data-reveal-order="1" data-ref="center" data-type="text_list_item">
  <rect x="80" y="98" width="2" height="80" rx="1" fill="#10b981" opacity="0.35" />
  <circle cx="85" cy="101" r="3" fill="#10b981" />
  <text x="98" y="106" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">Numbers less than zero are called NEGATIVE NUMBERS.</text>
  </g>
  <g id="u2" data-reveal-order="2" data-ref="center" data-type="text_list_item">
  <circle cx="85" cy="119" r="3" fill="#10b981" />
  <text x="98" y="124" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">On a number line, negative numbers sit to the LEFT of zero.</text>
  </g>
  <g id="u3" data-reveal-order="3" data-ref="center" data-type="text_list_item">
  <circle cx="85" cy="137" r="3" fill="#10b981" />
  <text x="98" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">The further left a number is, the smaller it is.</text>
  </g>
  <g id="u4" data-reveal-order="4" data-ref="center" data-type="text_list_item">
  <circle cx="85" cy="155" r="3" fill="#10b981" />
  <text x="98" y="160" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">Negative numbers are always smaller than zero and any positive number.</text>
  </g>
</svg>