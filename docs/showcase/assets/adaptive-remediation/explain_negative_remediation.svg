<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="480" fill="#f8fafc" />
  <rect width="800" height="65" fill="#1565C0" />
  <text x="80" y="44" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="start">Explain: explain negative remediation</text>
  <rect x="651" y="23" width="69" height="18" rx="4" fill="#000000" opacity="0.35" />
  <text x="685" y="36" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">EXPLAIN</text>
  <line x1="80" y1="65" x2="720" y2="65" stroke="#fecaca" stroke-width="1.5" />
  <rect x="80" y="65" width="118" height="16" rx="3" fill="#fef2f2" stroke="#fecaca" stroke-width="1.2" />
  <text x="139" y="76.5" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#7f1d1d" text-anchor="middle">MISCONCEPTION FIX</text>
  <rect x="80" y="90" width="294" height="186" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" />
  <path d="M 105 91 L 88 91 A 7 7 0 0 0 81 98 L 81 268 A 7 7 0 0 0 88 275 L 105 275 Z" fill="#ffedd5" />
  <line x1="105" y1="91" x2="105" y2="275" stroke="#fdba74" stroke-width="1" />
  <text x="93" y="183.0" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#9a3412" text-anchor="middle" transform="rotate(-90, 93, 183.0)">SOLVE</text>
  <text x="116" y="119" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="start">Which is LARGER: -10 or -2?</text>
  <rect x="116" y="147" width="113" height="72" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" />
  <circle cx="135" cy="183" r="11" fill="#ef4444" />
  <text x="135" y="186.5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">A</text>
  <text x="158" y="178" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#7f1d1d" text-anchor="start">-10 (since</text>
  <text x="158" y="194" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#7f1d1d" text-anchor="start">10 &gt; 2)</text>
  <rect x="245" y="147" width="113" height="72" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" />
  <circle cx="264" cy="183" r="11" fill="#22c55e" />
  <text x="264" y="186.5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">B</text>
  <text x="287" y="162" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#14532d" text-anchor="start">-2 (since</text>
  <text x="287" y="178" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#14532d" text-anchor="start">it is</text>
  <text x="287" y="194" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#14532d" text-anchor="start">further to</text>
  <text x="287" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#14532d" text-anchor="start">the right)</text>
  <rect x="116" y="231" width="113" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <circle cx="135" cy="251" r="11" fill="#f1f5f9" />
  <text x="135" y="254.5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">C</text>
  <text x="158" y="246" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">They are</text>
  <text x="158" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">equal</text>
  <rect x="245" y="231" width="113" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <circle cx="264" cy="251" r="11" fill="#f1f5f9" />
  <text x="264" y="254.5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">D</text>
  <text x="287" y="246" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">Cannot be</text>
  <text x="287" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">determined</text>
  <rect x="390" y="90" width="330" height="124" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" />
  <path d="M 415 91 L 398 91 A 7 7 0 0 0 391 98 L 391 206 A 7 7 0 0 0 398 213 L 415 213 Z" fill="#dbeafe" />
  <line x1="415" y1="91" x2="415" y2="213" stroke="#93c5fd" stroke-width="1" />
  <text x="403" y="152.0" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#1e40af" text-anchor="middle" transform="rotate(-90, 403, 152.0)">REMEMBER</text>
  <text x="426" y="116" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0284c7" text-anchor="start">Comparing Negatives Rule</text>
  <text x="426" y="138" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">A negative number represents values below</text>
  <text x="426" y="156" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">zero.</text>
  <text x="426" y="174" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">On a number line, values always increase</text>
  <text x="426" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">from left to right.</text>
  <rect x="390" y="230" width="330" height="174" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" />
  <path d="M 415 231 L 398 231 A 7 7 0 0 0 391 238 L 391 396 A 7 7 0 0 0 398 403 L 415 403 Z" fill="#ffedd5" />
  <line x1="415" y1="231" x2="415" y2="403" stroke="#fdba74" stroke-width="1" />
  <text x="403" y="317.0" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#9a3412" text-anchor="middle" transform="rotate(-90, 403, 317.0)">SOLVE</text>
  <circle cx="441" cy="257" r="11" fill="#f97316" opacity="0.15" />
  <circle cx="441" cy="257" r="11" fill="none" stroke="#f97316" stroke-width="1.5" />
  <text x="441" y="261" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c2410c" text-anchor="middle">1</text>
  <text x="464" y="249" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">Mark -10 and -2 on a horizontal</text>
  <text x="464" y="267" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">number line.</text>
  <line x1="441" y1="268" x2="441" y2="290" stroke="#f97316" stroke-width="1.2" opacity="0.3" stroke-dasharray="3 3" />
  <circle cx="441" cy="301" r="11" fill="#f97316" opacity="0.15" />
  <circle cx="441" cy="301" r="11" fill="none" stroke="#f97316" stroke-width="1.5" />
  <text x="441" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c2410c" text-anchor="middle">2</text>
  <text x="464" y="293" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">Since -2 is to the right of -10, we</text>
  <text x="464" y="311" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#334155" text-anchor="start">know -2 &gt; -10.</text>
  <rect x="426" y="344" width="278" height="48" rx="6" fill="#f97316" opacity="0.08" />
  <rect x="426" y="344" width="278" height="48" rx="6" fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.4" />
  <text x="440" y="363" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="start">Hence, B is correct.</text>
</svg>