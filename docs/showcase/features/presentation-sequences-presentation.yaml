schema_version: '0.6'
slides:
- id: intro_points
  advance: auto
  duration: 10.0
  reveals:
  - target: intro_points
    steps:
    - index: 0
      visible_items:
      - 0
      caption: First, let's look at point one.
      auto_advance_after: 3.0
    - index: 1
      visible_items:
      - 0
      - 1
      caption: Next, we add the second point.
      auto_advance_after: 3.0
    - index: 2
      visible_items:
      - 0
      - 1
      - 2
      caption: Finally, the third point explains zoom capability.
      auto_advance_after: 4.0
  svg_ref: C:\project\eduvis\docs\showcase\assets\presentation-demo\intro_points.svg
- id: triangle_zoom
  advance: manual
  reveals:
  - target: triangle_zoom
    steps:
    - index: 0
      caption: Here is an equilateral triangle.
      viewport:
        zoom: 1.0
        center:
        - 400.0
        - 300.0
      auto_advance_after: 4.0
    - index: 1
      caption: Let's zoom into vertex A (bottom-left) to focus on the 60 degree angle.
      viewport:
        zoom: 2.0
        center:
        - 200.0
        - 350.0
      auto_advance_after: 4.0
    - index: 2
      caption: Now let's pan over to vertex B at the top.
      viewport:
        zoom: 2.0
        center:
        - 400.0
        - 150.0
      auto_advance_after: 4.0
    - index: 3
      caption: And finally zoom back out to see the full triangle.
      viewport:
        zoom: 1.0
        center:
        - 400.0
        - 300.0
  svg_ref: C:\project\eduvis\docs\showcase\assets\presentation-demo\triangle_zoom.svg
