# EduVis Showcase: Adaptive Remediation Pattern
# Demonstrates the CHECK -> REMEDIATION_FOR -> RETRY adaptive tutoring loop
#
# Educational insight: Students often confuse digit size with negative number magnitude.
# -10 looks "bigger" than -2 (digit-wise), but sits further left (is actually smaller).
#
# How EduVis encodes branching WITHOUT explicit if/then:
# - The runtime reads the remediation_for relationship
# - Shows the CHECK first; on failure, shows the HINT and retries
# - The progression still declares the logical order

lesson:
  syllabus: showcase
  topic: adaptive-remediation
  title: "Adaptive Remediation Demo: Catching the Misconception"

progression:
  pattern: direct_instruction
  pedagogy:
    confidence_first: false  # remediation flow, not confidence building
    explain_why: true
    no_skipped_steps: true
  phases:
    - phase: explain
      purpose: conceptual_model
    - phase: guided_practice
    - phase: independent_practice
      difficulty: starter

content:

  # --- SETUP ------------------------------------------------------------------
  # Establish what we know about negative number ordering.

  - id: setup_concept
    type: text_list
    placement:
      lesson_phase: explain
      purpose: conceptual_model
      layout_zone: center
      visual_weight: primary
      memory_role: anchor
    items:
      - "On a number line, numbers to the RIGHT are always larger."
      - "Numbers to the LEFT are always smaller."
      - "For negative numbers: -2 is to the RIGHT of -10, so -2 > -10."

  # --- GUIDED EXAMPLE ---------------------------------------------------------
  # Show the correct way of thinking.

  - id: guided_worked_example
    type: example_panel
    placement:
      lesson_phase: guided_practice
      layout_zone: center
      visual_weight: primary
      memory_role: example
    actions:
      conceptual:
        - compare: [-10, -2]
        - identify: direction
    relationships:
      reinforces:
        - setup_concept
    items:
      - heading: "Worked Example: Which is larger, -10 or -2?"
        body: |
          Step 1: Locate both numbers on the number line.
          Step 2: Look at their POSITION, not the digit size.
          Step 3: -10 is to the LEFT of -2.
          Step 4: The number to the RIGHT is larger.
          Step 5: Therefore, -2 > -10.

          REMEMBER: A bigger digit (-10 vs -2) does NOT mean a bigger value!
          Position on the line is what matters.

  # --- CHECK: Does the student have the misconception? ----------------------
  # This multiple choice question specifically targets the common error.
  # If answered incorrectly, the student will receive HINT7.

  - id: check_misconception
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: starter
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    relationships:
      precedes:
        - hint_remediation
    question: "Which is LARGER: -10 or -2?"
    options:
      A: "-10 (because 10 > 2)"
      B: "-2 (because it's further right on the number line)"
      C: "They are equal"
      D: "Cannot compare them"

  # --- REMEDIATION: IF the student answers incorrectly ----------------------
  # The runtime reads remediation_for and shows this HINT on failure of CHECK.
  # This is how adaptive tutoring is encoded in EduVis without explicit branching.

  - id: hint_remediation
    type: hint_list
    placement:
      lesson_phase: guided_practice  # logically part of the recovery
      layout_zone: center
      visual_weight: primary
      memory_role: misconception_fix
    actions:
      conceptual:
        - identify: misconception
        - compare: [-10, -2]
    relationships:
      remediation_for:
        - check_misconception
      reinforces:
        - guided_worked_example
    items:
      - "Step 1: The DIGIT size (10 vs 2) does NOT determine the value of negative numbers."
      - "Step 2: Draw both numbers on a number line: mark -10 and -2."
      - "Step 3: See that -10 is to the LEFT of -2."
      - "Step 4: Numbers further LEFT are always SMALLER."
      - "Step 5: Therefore -10 < -2 (negative ten is less than negative two)."
    final: "Now try the question again: which is larger, -10 or -2?"

  # --- MISCONCEPTION ANCHOR --------------------------------------------------
  # Explicit statement of what the wrong thinking is and why it breaks.
  # Used for student reflection and teacher diagnostics.

  - id: misconception_explanation
    type: callout_box
    placement:
      lesson_phase: explain
      purpose: comparison
      layout_zone: center
      visual_weight: supporting
      memory_role: misconception_fix
    title: "Why -10 < -2 (not -10 > -2)"
    lines:
      - "WRONG: 'I'll compare the digits: 10 > 2, so -10 > -2.'"
      - "RIGHT: 'I'll check the number line position: -10 is further LEFT, so -10 is smaller.'"
      - "KEY INSIGHT: Negative numbers reverse our intuition about digits. More negative = smaller value."

  # --- VISUAL ANCHOR ---------------------------------------------------------
  # Show the number line so students can see the positions clearly.

  - id: visual_number_line_comparison
    type: number_line
    placement:
      lesson_phase: explain
      purpose: conceptual_model
      layout_zone: center
      visual_weight: supporting
      memory_role: anchor
    range: [-12, 0]
    direction_labels:
      left: "Smaller"
      right: "Larger"
    highlight:
      - value: -10
        label: "-10\n(further left,\nsmaller value)"
        color: red
      - value: -2
        label: "-2\n(further right,\nlarger value)"
        color: green
