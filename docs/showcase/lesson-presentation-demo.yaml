# EduVis Showcase: Presentation & Player Demo
# Pattern: direct_instruction
# Topic: Presentation features (reveals, captions, viewport zooms)

curriculum:
  code: showcase
  topic: presentation-demo

lesson:
  title: EduVis Presentation Showcase

progression:
  pattern: direct_instruction
  pedagogy: {}
  phases:
    - phase: explain

content:
  - id: intro_points
    type: text_list
    placement:
      lesson_phase: explain
      layout_zone: center
      memory_role: anchor
    items:
      - "Welcome to EduVis presentation layers."
      - "Presentation layers allow sequential reveals."
      - "And zoom animations to focus on key areas."

  - id: triangle_zoom
    type: geometry_shape
    placement:
      lesson_phase: explain
      layout_zone: center
      memory_role: example
    vertices: [[200, 350], [400, 150], [600, 350]]
    labels: ["A", "B", "C"]
    angles:
      - vertex: "A"
        label: "60 deg"
      - vertex: "B"
        label: "60 deg"
      - vertex: "C"
        label: "60 deg"

presentation:
  slides:
    - id: intro_points
      advance: auto
      duration: 10.0
      reveals:
        - target: intro_points
          steps:
            - index: 0
              visible_items: [0]
              caption: "First, let's look at point one."
              auto_advance_after: 3.0
            - index: 1
              visible_items: [0, 1]
              caption: "Next, we add the second point."
              auto_advance_after: 3.0
            - index: 2
              visible_items: [0, 1, 2]
              caption: "Finally, the third point explains zoom capability."
              auto_advance_after: 4.0
    - id: triangle_zoom
      advance: manual
      reveals:
        - target: triangle_zoom
          steps:
            - index: 0
              caption: "Here is an equilateral triangle."
              viewport:
                zoom: 1.0
                center: [400.0, 300.0]
              auto_advance_after: 4.0
            - index: 1
              caption: "Let's zoom into vertex A (bottom-left) to focus on the 60 degree angle."
              viewport:
                zoom: 2.0
                center: [200.0, 350.0]
              auto_advance_after: 4.0
            - index: 2
              caption: "Now let's pan over to vertex B at the top."
              viewport:
                zoom: 2.0
                center: [400.0, 150.0]
              auto_advance_after: 4.0
            - index: 3
              caption: "And finally zoom back out to see the full triangle."
              viewport:
                zoom: 1.0
                center: [400.0, 300.0]
