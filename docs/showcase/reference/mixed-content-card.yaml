# EduVis-Core Example: Mixed Content Card Demo
# Replicates the decimal subtraction "Learn with an example" layout

schema_version: "0.7"

curriculum:
  code: SEC-math-2027
  topic: N1.6

lesson:
  title: Learn with an example

progression:
  pattern: confidence_ladder
  pedagogy:
    confidence_first: true
    explain_why: true
    no_skipped_steps: true
  phases:
    - phase: guided_practice

content:
  - id: decimal_question_card
    type: mixed_card
    placement:
      lesson_phase: guided_practice
      memory_role: example
    actions:
      conceptual:
        - predict: unknown
    ribbon_type: review
    ribbon_label: question
    items:
      - type: text
        lines:
          - "Subtract."
      - type: math_grid
        mode: arithmetic
        rows:
          - ["", "0", ".", "4"]
          - ["-", "0", ".", "2"]
          - "line"
          - ["", " ", ".", " "]

  - id: decimal_solution_card
    type: mixed_card
    placement:
      lesson_phase: guided_practice
      memory_role: example
    actions:
      procedural:
        - calculate: decimal-subtraction
    ribbon_type: solve
    ribbon_label: solution
    items:
      - type: text
        lines:
          - "Remember to line up the decimal points."
      - type: math_grid
        mode: arithmetic
        rows:
          - ["", "0", ".", "4"]
          - ["-", "0", ".", "2"]
          - "line"
          - ["", "", "?", ""]
      - type: text
        lines:
          - "Subtract as you would subtract whole numbers. Remember to write the decimal point in the answer."
      - type: math_grid
        mode: arithmetic
        rows:
          - ["", "0", ".", "4"]
          - ["-", "0", ".", "2"]
          - "line"
          - ["", "0", ".", "2"]
      - type: text
        lines:
          - "The difference is 0.2."
