# EduVis Showcase: Negative Numbers - Full Lesson
# Pattern: confidence_ladder
# Demonstrates: hook -> explore -> explain -> guided -> starter -> routine -> challenge -> recall
# This lesson builds from concrete scenarios (temperature, money) through abstract rules

curriculum:
  code: showcase
  topic: negative-numbers

lesson:
  title: Negative Numbers - Understanding Values Below Zero

progression:
  pattern: confidence_ladder
  pedagogy:
    confidence_first: true
    explain_why: true
    no_skipped_steps: true
  phases:
    - phase: hook
    - phase: explore
    - phase: explain
      purpose: conceptual_model
    - phase: explain
      purpose: procedure
    - phase: explain
      purpose: comparison
    - phase: guided_practice
      count: 1
    - phase: independent_practice
      difficulty: starter
      count: 3
    - phase: independent_practice
      difficulty: routine
      count: 2
    - phase: challenge
      count: 1
    - phase: recall
      count: 2

content:

  # --- HOOK ------------------------------------------------------------------
  # Concrete, real-world scenarios. Negative numbers not named yet.

  - id: hook_real_world
    type: fact_boxes
    placement:
      lesson_phase: hook
      layout_zone: center
      visual_weight: primary
      memory_role: example
    items:
      - text: "Temperature: Five degrees below zero (-5 deg C)"
        border_color: blue
      - text: "Finance: Owing ten dollars (-$10)"
        border_color: red

  # --- EXPLORE ---------------------------------------------------------------
  # Student observes: where do "below zero" and "owing" sit on a line?
  # Pattern discovery before the rule is stated.

  - id: explore_temperature_scale
    type: number_line
    placement:
      lesson_phase: explore
      layout_zone: center
      visual_weight: primary
      memory_role: example
      difficulty: starter
    actions:
      conceptual:
        - compare: [-5, 3]
    relationships:
      anchors:
        - hook_real_world
    range: [-5, 5]
    direction_labels:
      left: "Colder / Less"
      right: "Warmer / More"
    highlight:
      - value: -5
        label: "-5 deg C"
        color: blue
      - value: 3
        label: "3 deg C"
        color: green
      - value: 0
        label: "0 deg C"
        color: grey

  # --- EXPLAIN (conceptual model) ---------------------------------------------
  # Visual understanding: what does position mean?

  - id: explain_concept_negative
    type: number_line
    placement:
      lesson_phase: explain
      purpose: conceptual_model
      layout_zone: center
      visual_weight: primary
      memory_role: anchor
    actions:
      conceptual:
        - identify: direction
    relationships:
      reinforces:
        - explore_temperature_scale
      precedes:
        - explain_rule_negative
    range: [-5, 5]
    direction_labels:
      left: "Smaller values"
      right: "Larger values"
    highlight:
      - value: -3
        label: "-3\n(further left,\nsmaller value)"
        color: red
      - value: 0
        label: "0\n(reference zero)"
        color: grey
      - value: 3
        label: "3\n(further right,\nlarger value)"
        color: green

  # --- EXPLAIN (procedure) ---------------------------------------------------
  # State the rule explicitly — after intuition is built.

  - id: explain_rule_negative
    type: text_list
    placement:
      lesson_phase: explain
      purpose: procedure
      layout_zone: center
      visual_weight: primary
      memory_role: anchor
    relationships:
      reinforces:
        - explain_concept_negative
      precedes:
        - guided_example_negative
    items:
      - "Numbers less than zero are called NEGATIVE NUMBERS."
      - "On a number line, negative numbers sit to the LEFT of zero."
      - "The further left a number is, the smaller it is."
      - "Negative numbers are always smaller than zero and any positive number."

  # --- MISCONCEPTION IDENTIFICATION ------------------------------------------
  # Before practice: show the common error so students recognize and avoid it.

  - id: misconception_comparing_negatives
    type: example_panel
    placement:
      lesson_phase: explain
      purpose: comparison
      layout_zone: center
      visual_weight: supporting
      memory_role: misconception_fix
    actions:
      conceptual:
        - identify: misconception
    relationships:
      contradicts:
        - explain_rule_negative
    items:
      - heading: "Common Mistake"
        body: |
          Some students think: "-10 is LARGER than -2 because 10 is bigger than 2."
          WHY THIS IS WRONG: The digit size does NOT determine negative number size.
          On the number line, -10 is further LEFT than -2, so -10 is SMALLER.
      - heading: "Correct Thinking"
        body: |
          -10 < -2 (negative ten is less than negative two)
          Because -10 is further left on the number line, it is smaller.

  # --- GUIDED PRACTICE -------------------------------------------------------
  # Instructor walks through a worked example. Student follows each step.

  - id: guided_example_negative
    type: example_panel
    placement:
      lesson_phase: guided_practice
      layout_zone: center
      visual_weight: primary
      memory_role: example
    actions:
      conceptual:
        - compare: [-5, -1]
    relationships:
      reinforces:
        - explain_concept_negative
      precedes:
        - practice_starter_negative_1
    items:
      - heading: "Question: Which is colder, -5 deg C or -1 deg C?"
        body: |
          Step 1: Locate both numbers on a number line.
          Step 2: -5 is to the LEFT of -1.
          Step 3: The number further left is smaller.
          Step 4: Therefore, -5 deg C is colder (smaller) than -1 deg C.
          Answer: -5 < -1

  # --- INDEPENDENT PRACTICE (STARTER) ----------------------------------------
  # Intentionally easy. Builds confidence before routine difficulty.

  - id: practice_starter_negative_1
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: starter
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    relationships:
      reinforces:
        - explain_rule_negative
    question: "Which is smaller: -1 or -5?"
    options:
      A: "-1"
      B: "-5"
      C: "They are equal"
      D: "Cannot tell"
    answer: "B"

  - id: practice_starter_negative_2
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: starter
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "Which is larger: 0 or -3?"
    options:
      A: "0"
      B: "-3"
      C: "They are equal"
      D: "Cannot tell"
    answer: "A"

  - id: practice_starter_negative_3
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: starter
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "Arrange from smallest to largest: -1, 0, -4"
    options:
      A: "-4, -1, 0"
      B: "-1, -4, 0"
      C: "0, -1, -4"
      D: "-4, 0, -1"
    answer: "A"

  # --- INDEPENDENT PRACTICE (ROUTINE) ----------------------------------------
  # Exam-style problems. Typical difficulty for assessment.

  - id: practice_routine_negative_1
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: routine
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "The temperature in City A is -8 deg C. City B is -3 deg C. Which city is colder?"
    options:
      A: "City A"
      B: "City B"
      C: "Both the same"
      D: "Cannot tell"
    answer: "A"

  - id: practice_routine_negative_2
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: routine
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "A submarine is at -40 m. A fish is at -15 m. Which is deeper?"
    options:
      A: "The submarine (deeper)"
      B: "The fish (deeper)"
      C: "Same depth"
      D: "Cannot tell"
    answer: "A"

  # --- CHALLENGE -------------------------------------------------------------
  # Stretch question. Extends beyond routine application.

  - id: challenge_negative
    type: multiple_choice
    placement:
      lesson_phase: challenge
      difficulty: challenge
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
        - identify: misconception
    question: |
      Amir says: "-20 is BIGGER than -3 because 20 is bigger than 3."
      What is wrong with Amir's reasoning?
    options:
      A: "On the number line, -20 is further LEFT than -3, so -20 is SMALLER, not bigger"
      B: "He is correct — -20 > -3"
      C: "The digit size does not matter for negative numbers"
      D: "Both A and C"
    answer: "D"

  # --- RECALL ----------------------------------------------------------------
  # Retrieval without re-reading. Builds long-term memory.

  - id: recall_negative_1
    type: multiple_choice
    placement:
      lesson_phase: recall
      layout_zone: center
      visual_weight: supporting
      memory_role: retrieval
    actions:
      conceptual:
        - retrieve: signed-number-ordering
    question: "WITHOUT LOOKING BACK — Which is larger: -7 or -2?"
    options:
      A: "-7"
      B: "-2"
      C: "They are equal"
      D: "Cannot tell"
    answer: "B"

  - id: recall_negative_2
    type: multiple_choice
    placement:
      lesson_phase: recall
      layout_zone: center
      visual_weight: supporting
      memory_role: retrieval
    actions:
      conceptual:
        - retrieve: signed-number-ordering
    question: "WITHOUT LOOKING BACK — Arrange from smallest to largest: -3, 1, -8, 0"
    options:
      A: "-8, -3, 0, 1"
      B: "-3, -8, 0, 1"
      C: "1, 0, -3, -8"
      D: "0, 1, -3, -8"
    answer: "A"

presentation:
  slides:
    - id: hook_real_world
      advance: manual
      reveals:
        - target: hook_real_world
          steps:
            - index: 0
              visible_items: [0]
              caption: "Let's look at a concrete real-world scenario: temperature at five degrees below zero (-5 deg C)."
              auto_advance_after: 4.0
            - index: 1
              visible_items: [0, 1]
              caption: "Another scenario is finance: when you owe someone ten dollars, we write that as -$10."
              auto_advance_after: 4.0

    - id: explore_temperature_scale
      advance: manual
      reveals:
        - target: explore_temperature_scale
          steps:
            - index: 0
              visible_items: [2]
              caption: "Here is a temperature scale. Let's start at the reference point: zero degrees Celsius (0 deg C)."
              viewport:
                zoom: 1.0
                center: [400.0, 300.0]
              auto_advance_after: 4.0
            - index: 1
              visible_items: [2, 1]
              caption: "A warmer temperature, like 3 deg C, is to the right of zero."
              viewport:
                zoom: 1.5
                center: [550.0, 300.0]
              auto_advance_after: 4.0
            - index: 2
              visible_items: [2, 1, 0]
              caption: "A colder temperature, like -5 deg C, sits to the left of zero. Notice the directions: left is colder, right is warmer."
              viewport:
                zoom: 1.5
                center: [250.0, 300.0]
              auto_advance_after: 5.0
            - index: 3
              visible_items: [2, 1, 0]
              caption: "Let's zoom back out to see the entire scale from colder to warmer."
              viewport:
                zoom: 1.0
                center: [400.0, 300.0]

    - id: explain_concept_negative
      advance: manual
      reveals:
        - target: explain_concept_negative
          steps:
            - index: 0
              visible_items: [1]
              caption: "Let's define what these positions mean on a number line, starting with our reference zero."
              viewport:
                zoom: 1.0
                center: [400.0, 300.0]
              auto_advance_after: 4.0
            - index: 1
              visible_items: [1, 2]
              caption: "Moving to the right gives us larger values, such as positive 3."
              viewport:
                zoom: 1.5
                center: [550.0, 300.0]
              auto_advance_after: 4.0
            - index: 2
              visible_items: [1, 2, 0]
              caption: "Moving to the left gives us smaller values. For example, -3 is further left and therefore smaller."
              viewport:
                zoom: 1.5
                center: [250.0, 300.0]
              auto_advance_after: 5.0

    - id: explain_rule_negative
      advance: manual
      reveals:
        - target: explain_rule_negative
          steps:
            - index: 0
              visible_items: [0]
              caption: "First rule: Numbers less than zero are called negative numbers."
              auto_advance_after: 3.5
            - index: 1
              visible_items: [0, 1]
              caption: "Second rule: On a number line, negative numbers always sit to the left of zero."
              auto_advance_after: 3.5
            - index: 2
              visible_items: [0, 1, 2]
              caption: "Third rule: The further left a number is, the smaller it is."
              auto_advance_after: 3.5
            - index: 3
              visible_items: [0, 1, 2, 3]
              caption: "Fourth rule: Negative numbers are always smaller than zero and any positive number."

    - id: misconception_comparing_negatives
      advance: manual
      reveals:
        - target: misconception_comparing_negatives
          steps:
            - index: 0
              visible_items: [0]
              caption: "Be careful! A common mistake is thinking -10 is larger than -2 because 10 is bigger than 2."
              auto_advance_after: 5.0
            - index: 1
              visible_items: [0, 1]
              caption: "Here is the correct thinking: since -10 is further left than -2 on the number line, -10 is smaller. So -10 < -2."

    - id: guided_example_negative
      advance: manual
      reveals:
        - target: guided_example_negative
          steps:
            - index: 0
              visible_items: [0]
              caption: "Let's walk through a question together: Which is colder, -5 deg C or -1 deg C?"

