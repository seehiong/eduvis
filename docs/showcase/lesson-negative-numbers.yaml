# EduVis Showcase: Negative Numbers вЂ” Full Lesson
# Pattern: confidence_ladder
# Demonstrates: hookв†’exploreв†’explainв†’guidedв†’starterв†’routineв†’challengeв†’recall
# This lesson builds from concrete scenarios (temperature, money) through abstract rules

lesson:
  syllabus: showcase
  topic: negative-numbers
  title: Negative Numbers вЂ” Understanding Values Below Zero

progression:
  pattern: confidence_ladder
  pedagogy:
    confidence_first: true
    explain_why: true
    no_skipped_steps: true
  phases:
    - phase: hook
    - phase: explore
    - phase: explain
      purpose: conceptual_model
    - phase: explain
      purpose: procedure
    - phase: guided_practice
      count: 1
    - phase: independent_practice
      difficulty: starter
      count: 3
    - phase: independent_practice
      difficulty: routine
      count: 2
    - phase: challenge
      count: 1
    - phase: recall
      count: 2

content:

  # в”Ђв”Ђ HOOK в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Concrete, real-world scenarios. Negative numbers not named yet.

  - id: hook_real_world
    type: fact_boxes
    placement:
      lesson_phase: hook
      layout_zone: center
      visual_weight: primary
      memory_role: anchor
    items:
      - text: "Temperature: Five degrees below zero (-5В°C)"
        border_color: blue
      - text: "Finance: Owing ten dollars (-$10)"
        border_color: red

  # в”Ђв”Ђ EXPLORE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Student observes: where do "below zero" and "owing" sit on a line?
  # Pattern discovery before the rule is stated.

  - id: explore_temperature_scale
    type: number_line
    placement:
      lesson_phase: explore
      layout_zone: center
      visual_weight: primary
      memory_role: example
      difficulty: starter
    actions:
      conceptual:
        - compare: [-5, 3]
    relationships:
      anchors:
        - hook_real_world
    range: [-5, 5]
    direction_labels:
      left: "Colder / Less"
      right: "Warmer / More"
    highlight:
      - value: -5
        label: "-5В°C"
        color: blue
      - value: 3
        label: "3В°C"
        color: green
      - value: 0
        label: "0В°C"
        color: grey

  # в”Ђв”Ђ EXPLAIN (conceptual model) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Visual understanding: what does position mean?

  - id: explain_concept_negative
    type: number_line
    placement:
      lesson_phase: explain
      purpose: conceptual_model
      layout_zone: center
      visual_weight: primary
      memory_role: anchor
    actions:
      conceptual:
        - identify: direction
    relationships:
      reinforces:
        - explore_temperature_scale
      precedes:
        - explain_rule_negative
    range: [-5, 5]
    direction_labels:
      left: "Smaller values"
      right: "Larger values"
    highlight:
      - value: -3
        label: "-3"
        color: red
      - value: 0
        label: "0"
        color: grey
      - value: 3
        label: "3"
        color: green

  # в”Ђв”Ђ EXPLAIN (procedure) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # State the rule explicitly вЂ” after intuition is built.

  - id: explain_rule_negative
    type: text_list
    placement:
      lesson_phase: explain
      purpose: procedure
      layout_zone: center
      visual_weight: primary
      memory_role: anchor
    relationships:
      reinforces:
        - explain_concept_negative
      precedes:
        - guided_example_negative
    items:
      - "Numbers less than zero are called NEGATIVE NUMBERS."
      - "On a number line, negative numbers sit to the LEFT of zero."
      - "The further left a number is, the smaller it is."
      - "Negative numbers are always smaller than zero and any positive number."

  # в”Ђв”Ђ MISCONCEPTION IDENTIFICATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Before practice: show the common error so students recognize and avoid it.

  - id: misconception_comparing_negatives
    type: example_panel
    placement:
      lesson_phase: explain
      purpose: comparison
      layout_zone: center
      visual_weight: supporting
      memory_role: misconception_fix
    actions:
      conceptual:
        - identify: misconception
    relationships:
      contradicts:
        - explain_rule_negative
    items:
      - heading: "Common Mistake"
        body: |
          Some students think: "-10 is LARGER than -2 because 10 is bigger than 2."
          WHY THIS IS WRONG: The digit size does NOT determine negative number size.
          On the number line, -10 is further LEFT than -2, so -10 is SMALLER.
      - heading: "Correct Thinking"
        body: |
          -10 < -2 (negative ten is less than negative two)
          Because -10 is further left on the number line, it is smaller.

  # в”Ђв”Ђ GUIDED PRACTICE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Instructor walks through a worked example. Student follows each step.

  - id: guided_example_negative
    type: example_panel
    placement:
      lesson_phase: guided_practice
      layout_zone: center
      visual_weight: primary
      memory_role: example
    actions:
      conceptual:
        - compare: [-5, -1]
    relationships:
      reinforces:
        - explain_concept_negative
      precedes:
        - practice_starter_negative_1
    items:
      - heading: "Question: Which is colder, -5В°C or -1В°C?"
        body: |
          Step 1: Locate both numbers on a number line.
          Step 2: -5 is to the LEFT of -1.
          Step 3: The number further left is smaller.
          Step 4: Therefore, -5В°C is colder (smaller) than -1В°C.
          Answer: -5 < -1

  # в”Ђв”Ђ INDEPENDENT PRACTICE (STARTER) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Intentionally easy. Builds confidence before routine difficulty.

  - id: practice_starter_negative_1
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: starter
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    relationships:
      reinforces:
        - explain_rule_negative
    question: "Which is smaller: -1 or -5?"
    options:
      A: "-1"
      B: "-5"
      C: "They are equal"
      D: "Cannot tell"

  - id: practice_starter_negative_2
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: starter
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "Which is larger: 0 or -3?"
    options:
      A: "0"
      B: "-3"
      C: "They are equal"
      D: "Cannot tell"

  - id: practice_starter_negative_3
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: starter
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "Arrange from smallest to largest: -1, 0, -4"
    options:
      A: "-4, -1, 0"
      B: "-1, -4, 0"
      C: "0, -1, -4"
      D: "-4, 0, -1"

  # в”Ђв”Ђ INDEPENDENT PRACTICE (ROUTINE) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Exam-style problems. Typical difficulty for assessment.

  - id: practice_routine_negative_1
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: routine
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "The temperature in City A is -8В°C. City B is -3В°C. Which city is colder?"
    options:
      A: "City A"
      B: "City B"
      C: "Both the same"
      D: "Cannot tell"

  - id: practice_routine_negative_2
    type: multiple_choice
    placement:
      lesson_phase: independent_practice
      difficulty: routine
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
    question: "A submarine is at -40 m. A fish is at -15 m. Which is deeper?"
    options:
      A: "The submarine (deeper)"
      B: "The fish (deeper)"
      C: "Same depth"
      D: "Cannot tell"

  # в”Ђв”Ђ CHALLENGE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Stretch question. Extends beyond routine application.

  - id: challenge_negative
    type: multiple_choice
    placement:
      lesson_phase: challenge
      difficulty: challenge
      layout_zone: center
      visual_weight: primary
      memory_role: practice
    actions:
      conceptual:
        - apply: signed-number-ordering
        - identify: misconception
    question: |
      Amir says: "-20 is BIGGER than -3 because 20 is bigger than 3."
      What is wrong with Amir's reasoning?
    options:
      A: "On the number line, -20 is further LEFT than -3, so -20 is SMALLER, not bigger"
      B: "He is correct вЂ” -20 > -3"
      C: "The digit size does not matter for negative numbers"
      D: "Both A and C"

  # в”Ђв”Ђ RECALL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Retrieval without re-reading. Builds long-term memory.

  - id: recall_negative_1
    type: multiple_choice
    placement:
      lesson_phase: recall
      layout_zone: center
      visual_weight: supporting
      memory_role: retrieval
    actions:
      conceptual:
        - retrieve: signed-number-ordering
    question: "WITHOUT LOOKING BACK вЂ” Which is larger: -7 or -2?"
    options:
      A: "-7"
      B: "-2"
      C: "They are equal"
      D: "Cannot tell"

  - id: recall_negative_2
    type: multiple_choice
    placement:
      lesson_phase: recall
      layout_zone: center
      visual_weight: supporting
      memory_role: retrieval
    actions:
      conceptual:
        - retrieve: signed-number-ordering
    question: "WITHOUT LOOKING BACK вЂ” Arrange from smallest to largest: -3, 1, -8, 0"
    options:
      A: "-8, -3, 0, 1"
      B: "-3, -8, 0, 1"
      C: "1, 0, -3, -8"
      D: "0, 1, -3, -8"
