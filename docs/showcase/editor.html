<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVis Schema — Live Editor</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Pyodide WASM Python -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.48.0/min/vs/loader.min.js"></script>

    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131a26;
            --bg-editor: #1e2530;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #262f3f;
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(99, 102, 241, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loading-text {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        #loading-subtext {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* Header */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(to right, #ffffff, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        select,
        button {
            background-color: var(--bg-editor);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        select:hover,
        select:focus {
            border-color: var(--primary);
        }

        button.btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            font-weight: 600;
            padding: 6px 16px;
        }

        button.btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 9999px;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-green);
        }

        /* Workspace Grid */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 60px);
            background-color: var(--bg-main);
        }

        .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            border-right: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            /* Prevent content from overflowing the panel */
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 40px;
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        /* Editor Section */
        #editor-container {
            flex-grow: 1;
            height: 0;
            /* Let flexbox control Monaco Editor's height */
            min-height: 0;
            /* Prevent flex expansion */
            width: 100%;
            background-color: var(--bg-editor);
        }

        .slide-selector-wrapper {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .slide-selector-header {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slide-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .slide-tab {
            background-color: var(--bg-editor);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .slide-tab:hover {
            border-color: var(--primary);
            color: var(--text-main);
        }

        .slide-tab.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: 500;
        }

        /* Preview Section */
        .preview-tabs {
            display: flex;
            gap: 4px;
        }

        .preview-tab {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preview-tab.active {
            background-color: var(--bg-editor);
            color: var(--text-main);
        }

        .preview-body {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: auto;
            position: relative;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        #svg-render-area {
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform-origin 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #svg-render-area svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* Glassmorphic Presentation Subtitle Panel */
        #narration-subtitle {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f3f4f6;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 80%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 5;
            line-height: 1.4;
            transition: opacity 0.3s ease;
        }

        /* Glassmorphic Controller Floating Bar */
        #presentation-controller {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            background: rgba(19, 26, 38, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 8px;
            user-select: none;
            transition: opacity 0.3s ease;
        }

        .timeline-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        #timeline-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--primary), #a855f7);
            transition: width 0.3s ease;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .btn-ctrl {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #d1d5db;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ctrl:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            color: #ffffff;
        }

        #step-indicator {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-weight: 500;
        }

        /* Raw XML Textarea */
        #xml-output-area {
            display: none;
            width: 100%;
            height: 100%;
            background-color: var(--bg-editor);
            border: none;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 16px;
            resize: none;
            outline: none;
        }

        .preview-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            padding: 0;
        }

        /* Error Banner */
        #error-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid var(--accent-red);
            display: none;
            z-index: 10;
        }

        /* Responsive Utilities */
        @media (max-width: 800px) {
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                height: calc(100vh - 60px);
            }

            .panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Loading WebAssembly Environment</div>
        <div id="loading-subtext">Fetching Pyodide Python core...</div>
    </div>

    <!-- Top Navigation Bar -->
    <header>
        <div class="logo-section">
            <div class="logo-icon">EV</div>
            <h1>EduVis Live Editor</h1>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="preset-select">Preset:</label>
                <select id="preset-select" onchange="onPresetChange(this.value)">
                    <option value="lesson-presentation-demo.yaml">Interactive Presentation &amp; Zoom Demo</option>
                    <option value="lesson-geometry-triangles.yaml">Angle Sum of a Triangle (Full Lesson)</option>
                    <option value="lesson-negative-numbers.yaml">Negative Numbers (Full Lesson)</option>
                    <option value="demo-adaptive-remediation.yaml">Adaptive Remediation Demo</option>
                    <option value="demo-remediation-layout.yaml">Remediation Layout &amp; MCQ Options Demo</option>
                    <option value="renderer_test.yaml">Comprehensive Renderer Test</option>
                    <option value="mixed_card_demo.yaml">Mixed Content Card Demo</option>
                </select>
            </div>
            <div class="control-group">
                <label for="group-select">Grade Sizing:</label>
                <select id="group-select" onchange="triggerRender()">
                    <option value="G1">G1 (Primary)</option>
                    <option value="G2">G2 (Middle)</option>
                    <option value="G3">G3 (High)</option>
                </select>
            </div>
            <button class="btn-primary" onclick="triggerRender()">Render</button>
            <div class="status-badge" id="status-container">
                <div class="status-dot"></div>
                <span id="status-text">Connected</span>
            </div>
        </div>
    </header>

    <!-- Core Workspace Split Screen -->
    <div class="workspace">

        <!-- Left Panel: Editor & Slide selector -->
        <div class="panel">
            <div class="panel-header">
                <div class="preview-tabs">
                    <button class="preview-tab active" id="tab-editor-content" onclick="switchEditorTab('content')">Content (content.yaml)</button>
                    <button class="preview-tab" id="tab-editor-presentation" onclick="switchEditorTab('presentation')">Presentation (presentation.yaml)</button>
                </div>
            </div>
            <!-- Monaco Editor Container -->
            <div id="editor-container"></div>

            <!-- Slide selector for full lessons -->
            <div class="slide-selector-wrapper" id="slide-selector-section" style="display: none;">
                <div class="slide-selector-header">
                    <span>SELECT SLIDE TO PREVIEW</span>
                    <span id="slide-count-indicator">1 of 1</span>
                </div>
                <div class="slide-list" id="slide-tabs-container">
                    <!-- Tabs injected dynamically -->
                </div>
            </div>
        </div>

        <!-- Right Panel: Visual Render Canvas & Output -->
        <div class="panel">
            <div class="panel-header">
                <div class="preview-tabs">
                    <button class="preview-tab active" id="tab-visual" onclick="togglePreviewTab('visual')">Visual
                        Preview</button>
                    <button class="preview-tab" id="tab-xml" onclick="togglePreviewTab('xml')">Raw SVG Source</button>
                </div>
                <div class="preview-actions">
                    <button class="btn-icon" title="Copy Raw SVG" onclick="copyRawSvg()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <button class="btn-icon" title="Download SVG" onclick="downloadSvg()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- SVG Render Frame -->
            <div class="preview-body">
                <div id="svg-render-area">
                    <!-- SVG gets injected here -->
                </div>
                <textarea id="xml-output-area" readonly></textarea>

                <!-- Subtitles Panel -->
                <div id="narration-subtitle" style="display: none;"></div>

                <!-- Glassmorphic Controller -->
                <div id="presentation-controller" style="display: none;">
                    <div class="timeline-container">
                        <div id="timeline-progress-bar"></div>
                    </div>
                    <div class="control-row">
                        <button class="btn-ctrl" title="Step Back" onclick="prevStep()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <button class="btn-ctrl" id="btn-play-pause" title="Play/Pause Auto-Advance" onclick="togglePlayPause()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                        <button class="btn-ctrl" title="Step Forward" onclick="nextStep()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                        <span id="step-indicator">Step 1 of 1</span>
                    </div>
                </div>
            </div>

            <!-- Error Banner -->
            <div id="error-banner"></div>
        </div>

    </div>

    <!-- Controller Script -->
    <script>
        let pyodide = null;
        let selectedSlideIndex = 0;
        let currentSlides = [];
        let renderMode = "lesson"; // "lesson" or "slide"
        let isRenderInProgress = false;

        // Monaco Editor instance
        window.editor = null;
        window.contentModel = null;
        window.presentationModel = null;
        let activeEditorTab = 'content';

        function switchEditorTab(tabName) {
            if (activeEditorTab === tabName) return;
            activeEditorTab = tabName;

            document.getElementById('tab-editor-content').classList.remove('active');
            document.getElementById('tab-editor-presentation').classList.remove('active');

            if (tabName === 'content') {
                document.getElementById('tab-editor-content').classList.add('active');
                window.editor.setModel(window.contentModel);
            } else {
                document.getElementById('tab-editor-presentation').classList.add('active');
                window.editor.setModel(window.presentationModel);
            }
        }

        // Initialize Monaco Editor
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.48.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            window.contentModel = monaco.editor.createModel('# Loading content...', 'yaml');
            window.presentationModel = monaco.editor.createModel('# Loading presentation...', 'yaml');

            window.editor = monaco.editor.create(document.getElementById('editor-container'), {
                model: window.contentModel,
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 13,
                fontFamily: 'var(--font-mono)',
                minimap: { enabled: false },
                lineNumbers: "on",
                scrollbar: {
                    vertical: 'visible',
                    horizontal: 'visible'
                }
            });

            // Trigger render when editor changes (debounced)
            let timeout = null;
            const onModelChange = () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    parseStructureAndRender();
                }, 800);
            };

            window.contentModel.onDidChangeContent(onModelChange);
            window.presentationModel.onDidChangeContent(onModelChange);

            // Start initializing Python environment once Monaco is loaded
            initPython();
        });

        // Initialize Pyodide & Load Python dependencies
        async function initPython() {
            const updateStatus = (text, subtext) => {
                document.getElementById('loading-text').innerText = text;
                document.getElementById('loading-subtext').innerText = subtext;
            };

            try {
                updateStatus("Loading WebAssembly Core", "Fetching Pyodide environment...");
                pyodide = await loadPyodide();

                updateStatus("Setting up Micro Pip", "Loading pip installer package...");
                await pyodide.loadPackage("micropip");

                updateStatus("Installing Dependencies", "Installing PyYAML and loading local wheel...");
                await pyodide.runPythonAsync(`
                    import micropip
                    await micropip.install("pyyaml")
                    await micropip.install("./eduvis-0.3.0-py3-none-any.whl")
                `);

                updateStatus("Configuring Render Engine", "Importing Python libraries...");
                pyodide.runPython(`
import yaml
import json
from eduvis.renderers.svg.spec_renderer import SVGSpecRenderer
from eduvis.cli import _element_title, _ZONE_MAP, _LAYOUT_FOR_ZONE, _element_to_spec, _PHASE_STYLE, _DIFFICULTY_STYLE, _ROLE_COLOR

def _build_svg_spec_yaml(element: dict, elements_by_id: dict[str, dict] | None = None) -> str:
    # Resolve remediation_block question references if elements_by_id is provided
    if element.get("type") == "remediation_block" and elements_by_id:
        element = element.copy()
        review = element.get("review", {})
        if isinstance(review, dict):
            review = review.copy()
            q_id = review.get("source_question")
            if q_id and q_id in elements_by_id:
                review["question_spec"] = elements_by_id[q_id]
            element["review"] = review

    placement = element.get("placement") or {}
    if "zones" in element:
        zones = {}
        for z_name, z_elements in element["zones"].items():
            if isinstance(z_elements, list):
                zones[z_name] = [_element_to_spec(el) for el in z_elements]
            else:
                zones[z_name] = [_element_to_spec(z_elements)]
        layout = element.get("layout", "two-column")
    else:
        zone = _ZONE_MAP.get(placement.get("layout_zone", "full"), "full")
        layout = _LAYOUT_FOR_ZONE.get(zone, "header + full-width")
        zones = {zone: [_element_to_spec(element)]}

    phase = placement.get("lesson_phase", "")
    difficulty = placement.get("difficulty", "")
    memory_role = placement.get("memory_role", "")

    phase_style = _PHASE_STYLE.get(phase, {})
    header_color = phase_style.get("color", "#111111")
    phase_label = phase_style.get("label", "")

    # Differentiate starter / routine within independent_practice
    if phase == "independent_practice" and difficulty in _DIFFICULTY_STYLE:
        diff_style = _DIFFICULTY_STYLE[difficulty]
        header_color = diff_style["color"]
        phase_label = diff_style["label"]

    role_color = _ROLE_COLOR.get(memory_role, "")

    spec_dict = {
        "layout": layout,
        "header_color": header_color,
        "phase_label": phase_label,
        "role_color": role_color,
        "memory_role": memory_role,
        "zones": zones,
    }
    return yaml.dump(spec_dict, allow_unicode=True, default_flow_style=False)

def _merge_content_and_presentation(content_yaml_str, presentation_yaml_str):
    doc = yaml.safe_load(content_yaml_str)
    if not isinstance(doc, dict):
        doc = {}
    if presentation_yaml_str and presentation_yaml_str.strip():
        try:
            pres = yaml.safe_load(presentation_yaml_str)
            if isinstance(pres, dict):
                if "presentation" in pres:
                    doc["presentation"] = pres["presentation"]
                else:
                    doc["presentation"] = pres
        except Exception:
            pass
    return doc

def split_lesson_yaml(yaml_str):
    try:
        doc = yaml.safe_load(yaml_str)
    except Exception as e:
        return json.dumps({"content": yaml_str, "presentation": ""})
    
    if not isinstance(doc, dict):
        return json.dumps({"content": yaml_str, "presentation": ""})
    
    presentation_dict = {}
    if "presentation" in doc:
        presentation_dict = doc.pop("presentation")
    
    content_str = yaml.dump(doc, allow_unicode=True, default_flow_style=False, sort_keys=False)
    
    presentation_str = ""
    if presentation_dict:
        # Wrap it in 'presentation:' key or output it as is
        presentation_str = yaml.dump(presentation_dict, allow_unicode=True, default_flow_style=False, sort_keys=False)
        
    return json.dumps({"content": content_str, "presentation": presentation_str})

def parse_lesson_structure(content_yaml_str, presentation_yaml_str):
    try:
        doc = _merge_content_and_presentation(content_yaml_str, presentation_yaml_str)
        if isinstance(doc, dict) and "content" in doc:
            from eduvis.core import validate_lesson
            warnings = validate_lesson(doc)
            content = doc.get("content", [])
            slides = []
            for i, element in enumerate(content):
                if isinstance(element, dict):
                    slides.append({
                        "index": i,
                        "id": element.get("id", f"slide_{i+1}"),
                        "title": _element_title(element)
                    })
            return json.dumps({
                "type": "lesson",
                "title": (doc.get("lesson") or {}).get("title", "Lesson"),
                "slides": slides,
                "presentation": doc.get("presentation"),
                "warnings": warnings
            })
        else:
            return json.dumps({"type": "slide"})
    except Exception as e:
        return json.dumps({"error": str(e)})

def render_slide_from_lesson(content_yaml_str, presentation_yaml_str, index, posting_group, step_index=None):
    doc = _merge_content_and_presentation(content_yaml_str, presentation_yaml_str)
    content = doc.get("content", [])
    elements_by_id = {el["id"]: el for el in content if isinstance(el, dict) and "id" in el}
    
    lesson_title = (doc.get("lesson") or {}).get("title", "")
    element = content[index]
    
    presentation = doc.get("presentation")
    if step_index is not None and isinstance(presentation, dict) and "slides" in presentation:
        slide_id = element.get("id")
        slide_pres = next((s for s in presentation["slides"] if s.get("id") == slide_id), None)
        if slide_pres and "reveals" in slide_pres:
            def filter_elem(el, reveals, step_idx):
                el_id = el.get("id")
                for rev in reveals:
                    target = rev.get("target")
                    if target == el_id and "steps" in rev:
                        steps = rev["steps"]
                        step = next((s for s in steps if s.get("index") == step_idx), None)
                        if step:
                            visible_indices = step.get("visible_items")
                            if visible_indices is not None:
                                el = el.copy()
                                for list_field in ["items", "bars", "rows", "plots", "highlight", "highlights"]:
                                    if list_field in el and isinstance(el[list_field], list):
                                        el[list_field] = [
                                            item for i, item in enumerate(el[list_field])
                                            if i in visible_indices
                                        ]
                if "zones" in el and isinstance(el["zones"], dict):
                    el = el.copy()
                    zones = {}
                    for z_name, z_elements in el["zones"].items():
                        if isinstance(z_elements, list):
                            zones[z_name] = [filter_elem(el_sub, reveals, step_idx) for el_sub in z_elements]
                        else:
                            zones[z_name] = filter_elem(z_elements, reveals, step_idx)
                    el["zones"] = zones
                return el
            
            element = filter_elem(element, slide_pres["reveals"], step_index)
            elements_by_id = {k: filter_elem(v, slide_pres["reveals"], step_index) for k, v in elements_by_id.items()}
            
    first_dict_idx = next((i for i, el in enumerate(content) if isinstance(el, dict)), None)
    if lesson_title and index == first_dict_idx:
        title = f"{lesson_title} - {_element_title(element)}"
    else:
        title = _element_title(element)
    svg_spec_yaml = _build_svg_spec_yaml(element, elements_by_id)
    
    return renderer.render(svg_spec_yaml, title=title, posting_group=posting_group)

def render_raw_slide(yaml_str, posting_group):
    # If it is a raw slide, just render it directly
    return renderer.render(yaml_str, posting_group=posting_group)

        // Parse structure of YAML input and update slides / render
        function parseStructureAndRender() {
            if (!pyodide || isRenderInProgress) return;

            const presentationYaml = window.presentationModel ? window.presentationModel.getValue() : '';

                // Call Python function to parse the document metadata and slide structure

                const result = JSON.parse(resultJson);

                if (result.error) {
                    showError(result.error);
                    isRenderInProgress = false;
                    return;
                }

                if (result.warnings && result.warnings.length > 0) {
                    hasValidationErrorsOrWarnings = true;
                    validationMessages = result.warnings;
                    showValidationMessages(result.warnings);
                } else {
                    hasValidationErrorsOrWarnings = false;
                    validationMessages = [];
                    hideError();
                }

                presentationData = result.presentation;

                if (result.type === "lesson") {
                    renderMode = "lesson";
                    currentSlides = result.slides;

                    // Show slide selector
                    document.getElementById('slide-selector-section').style.display = 'flex';

                    // Keep selected slide within limits
                    if (selectedSlideIndex >= currentSlides.length) {
                        selectedSlideIndex = 0;

                    // Render tabs
                    updateSlideSelectorUI();
                } else {
                    renderMode = "slide";
                    document.getElementById('slide-selector-section').style.display = 'none';

        // Update the slide tabs interface

        // Actually execute the rendering in Python
        function performRender() {
            const contentYaml = window.contentModel ? window.contentModel.getValue() : '';
            const presentationYaml = window.presentationModel ? window.presentationModel.getValue() : '';
            const groupSelect = document.getElementById('group-select').value;

            if (renderMode === "lesson" && currentSlides.length === 0) {

            const slideId = slide ? slide.id : "";
            const slidePres = presentationData && presentationData.slides ?
                presentationData.slides.find(s => s.id === slideId) : null;

            const reveals = slidePres && slidePres.reveals ? slidePres.reveals : [];

            // Find total steps count
            let maxStepIndex = 0;
            reveals.forEach(rev => {
                if (rev.steps) {
                    rev.steps.forEach(st => {
                        if (st.index > maxStepIndex) maxStepIndex = st.index;

                }

            // Show or hide controller based on reveals presence or slide-level autoplay settings

            try {

                    if (slidePres && reveals.length > 0) {
                        svgOutput = pyodide.globals.get("render_slide_from_lesson")(contentYaml, presentationYaml, selectedSlideIndex, groupSelect, activeStepIndex);
                    } else {

                    }
                } else {

                }

                // Inject SVG into preview panel
                document.getElementById('svg-render-area').innerHTML = svgOutput;
                document.getElementById('xml-output-area').value = svgOutput;

                if (hasValidationErrorsOrWarnings) {
                    showValidationMessages(validationMessages);
                } else {
                    hideError();

                // If presentation slide, apply steps timing & viewport
                if (renderMode === "lesson" && slidePres) {
                    const hasSteps = reveals.length > 0;
                    document.getElementById('step-indicator').innerText = hasSteps ? `Step ${activeStepIndex + 1} of ${maxStepIndex + 1}` : `Slide ${selectedSlideIndex + 1} of ${currentSlides.length}`;
                    const progressPercent = hasSteps && maxStepIndex > 0 ? (activeStepIndex / maxStepIndex) * 100 : 100;
                    document.getElementById('timeline-progress-bar').style.width = `${progressPercent}%`;

                    let stepCaption = "";
                    let stepDuration = null;

                    if (hasSteps) {
                        reveals.forEach(rev => {
                            if (rev.steps) {

                                if (stepObj) {
                                    if (stepObj.caption) stepCaption = stepObj.caption;
                                    if (stepObj.auto_advance_after !== undefined) stepDuration = stepObj.auto_advance_after;
                                    if (stepObj.viewport) viewportData = stepObj.viewport;

                    // Fallback to slide-level duration/advance
                    if (stepDuration === null && slidePres.advance === 'auto' && slidePres.duration !== undefined) {
                        stepDuration = slidePres.duration;

                    const subtitleEl = document.getElementById('narration-subtitle');
