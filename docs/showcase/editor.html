<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVis Schema — Live Editor</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Pyodide WASM Python -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

    <!-- Mermaid JS Graph Library -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true
            }
        });
    </script>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.48.0/min/vs/loader.min.js"></script>

    <!-- Separated Stylesheet -->
    <link rel="stylesheet" href="./editor.css">
</head>

<body>

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Loading WebAssembly Environment</div>
        <div id="loading-subtext">Fetching Pyodide Python core...</div>
    </div>

    <!-- Top Navigation Bar -->
    <header>
        <div class="logo-section">
            <div class="logo-icon">EV</div>
            <h1>EduVis Live Editor</h1>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="preset-select">Preset:</label>
                <select id="preset-select" onchange="onPresetChange(this.value)">
                    <optgroup label="Full Lessons">
                        <option value="lessons/negative-numbers-confidence-ladder-lesson.yaml">Negative Numbers (Confidence Ladder)</option>
                        <option value="lessons/geometry-triangles-spatial-lesson.yaml">Angle Sum of a Triangle (Spatial Geometry)</option>
                    </optgroup>
                    <optgroup label="Feature Spotlights">
                        <option value="features/adaptive-remediation-branching-lesson.yaml">Adaptive Remediation &amp; Assessment</option>
                        <option value="features/presentation-sequences-lesson.yaml">Presentation Reveals &amp; Camera Zooms</option>
                    </optgroup>
                    <optgroup label="Curriculum Graphs">
                        <option value="reference/singapore-sec1-curriculum.yaml">Singapore Secondary 1 Math Curriculum</option>
                    </optgroup>
                    <optgroup label="Custom Sandbox">
                        <option value="custom">-- New Custom Spec (Blank) --</option>
                    </optgroup>
                    <optgroup label="Developer Reference">
                        <option value="reference/mixed-content-card.yaml">Mixed Content Card</option>
                        <option value="reference/exhaustive-element-catalog.yaml">Exhaustive Element Catalog</option>
                    </optgroup>
                </select>
            </div>
            <div class="control-group">
                <label for="group-select">Grade Sizing:</label>
                <select id="group-select" onchange="triggerRender()">
                    <option value="G1">G1 (Primary)</option>
                    <option value="G2">G2 (Middle)</option>
                    <option value="G3">G3 (High)</option>
                </select>
            </div>
            <button class="btn-primary" onclick="triggerRender()">Render</button>
            <div class="status-badge" id="status-container">
                <div class="status-dot"></div>
                <span id="status-text">Connected</span>
            </div>
        </div>
    </header>

    <!-- Core Workspace Split Screen -->
    <div class="workspace">

        <!-- Left Panel: Editor & Slide selector -->
        <div class="panel">
            <div class="panel-header">
                <div class="preview-tabs">
                    <button class="preview-tab active" id="tab-editor-content" onclick="switchEditorTab('content')">Content (content.yaml)</button>
                    <button class="preview-tab" id="tab-editor-presentation" onclick="switchEditorTab('presentation')">Presentation (presentation.yaml)</button>
                    <button class="preview-tab" id="tab-editor-curriculum" onclick="switchEditorTab('curriculum')">Curriculum (curriculum.yaml)</button>
                </div>
            </div>
            <!-- Monaco Editor Container -->
            <div id="editor-container"></div>

            <!-- Slide selector for full lessons -->
            <div class="slide-selector-wrapper" id="slide-selector-section" style="display: none;">
                <div class="slide-selector-header">
                    <span>SELECT SLIDE TO PREVIEW</span>
                    <span id="slide-count-indicator">1 of 1</span>
                </div>
                <div class="slide-list" id="slide-tabs-container">
                    <!-- Tabs injected dynamically -->
                </div>
            </div>
        </div>

        <!-- Right Panel: Visual Render Canvas & Output -->
        <div class="panel">
            <div class="panel-header">
                <div class="preview-tabs">
                    <button class="preview-tab active" id="tab-visual" onclick="togglePreviewTab('visual')">Visual Preview</button>
                    <button class="preview-tab" id="tab-xml" onclick="togglePreviewTab('xml')">Raw SVG Source</button>
                    <button class="preview-tab" id="tab-assessment" onclick="togglePreviewTab('assessment')">Interactive Assessment</button>
                    <button class="preview-tab" id="tab-curriculum" onclick="togglePreviewTab('curriculum')">Curriculum Analytics</button>
                </div>
                <div class="preview-actions">
                    <button class="btn-icon" title="Copy Raw SVG" onclick="copyRawSvg()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <button class="btn-icon" title="Download SVG" onclick="downloadSvg()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- SVG Render Frame / Interactive Assessment Canvas -->
            <div class="preview-body">
                <div id="svg-render-area">
                    <!-- SVG gets injected here -->
                </div>
                <textarea id="xml-output-area" readonly></textarea>
                
                <!-- Interactive Assessment Sandbox -->
                <div id="assessment-area">
                    <!-- Dynamic Interactive Assessment gets injected here -->
                </div>

                <!-- Curriculum Analytics View -->
                <div id="curriculum-area" style="display: none; flex-direction: column; width: 100%; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; background: #0f172a; color: #f8fafc;">
                    <!-- Dynamic Curriculum Map and Centrality Graph gets injected here -->
                </div>

                <!-- Subtitles Panel -->
                <div id="narration-subtitle" style="display: none;"></div>

                <!-- Glassmorphic Controller -->
                <div id="presentation-controller" style="display: none;">
                    <div class="timeline-container">
                        <div id="timeline-progress-bar"></div>
                    </div>
                    <div class="control-row">
                        <button class="btn-ctrl" title="Step Back" onclick="prevStep()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <button class="btn-ctrl" id="btn-play-pause" title="Play/Pause Auto-Advance" onclick="togglePlayPause()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                        <button class="btn-ctrl" title="Step Forward" onclick="nextStep()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                        <span id="step-indicator">Step 1 of 1</span>
                    </div>
                </div>
            </div>

            <!-- Error Banner -->
            <div id="error-banner"></div>
        </div>

    </div>

    <!-- Modularized JavaScript Runners -->
    <script src="./pyodide_runner.js?v=0.5.1"></script>
    <script src="./assessment_sandbox.js?v=0.5.1"></script>
    <script src="./editor.js?v=0.5.1"></script>
</body>

</html>
